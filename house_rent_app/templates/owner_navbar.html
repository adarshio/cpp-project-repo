<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}PropRent{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css" rel="stylesheet">
    <style>
        * {
            font-family: 'Inter', sans-serif;
        }
        .nav-link {
            position: relative;
            transition: color 0.2s;
        }
        .nav-link::after {
            content: '';
            position: absolute;
            width: 0;
            height: 2px;
            bottom: -4px;
            left: 50%;
            background-color: #2563eb;
            transition: all 0.2s;
            transform: translateX(-50%);
        }
        .nav-link:hover::after {
            width: 80%;
        }
        .nav-link.active::after {
            width: 80%;
        }
    </style>
</head>
<body class="bg-gray-50">
    <!-- Navigation -->
    <nav class="bg-white shadow-sm border-b border-gray-200 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center">
                    <!-- Logo -->
                    <div class="flex-shrink-0 flex items-center">
                        <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center">
                            <i class="fas fa-building text-white text-sm"></i>
                        </div>
                        <span class="ml-2 text-lg font-semibold text-gray-800">PropRent</span>
                    </div>
                    
                    <!-- Nav Links -->
                    <div class="hidden md:ml-10 md:flex md:space-x-8">
                        <a href="{% url 'owner_home' %}" 
                           class="nav-link inline-flex items-center px-1 pt-1 text-sm font-medium text-gray-700 {% if request.resolver_match.url_name == 'owner_home' %}active{% endif %}">
                            My Properties
                        </a>
                        <a href="{% url 'owner_requests' %}" 
                           class="nav-link inline-flex items-center px-1 pt-1 text-sm font-medium text-gray-700 {% if request.resolver_match.url_name == 'owner_requests' %}active{% endif %}">
                            Tenant Requests
                        </a>
                    </div>
                </div>
                
                <!-- Right side -->
                <div class="flex items-center">
                    <div class="relative ml-3" x-data="{ open: false }">
                        <div>
                            <button @click="open = !open" class="flex items-center space-x-3 focus:outline-none">
                                <div class="flex items-center">
                                    <span class="text-sm text-gray-700 mr-2">{{ request.user.username }}</span>
                                    <div class="w-8 h-8 bg-gray-200 rounded-full flex items-center justify-center">
                                        <i class="fas fa-user-tie text-gray-600 text-sm"></i>
                                    </div>
                                </div>
                                <i class="fas fa-chevron-down text-xs text-gray-500"></i>
                            </button>
                        </div>
                        
                        <div x-show="open" @click.away="open = false"
                             class="absolute right-0 mt-2 w-48 bg-white rounded-lg shadow-lg border border-gray-200 py-1">
                            <a href="{% url 'owner_info' %}" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-50">
                                <i class="fas fa-user mr-2 text-gray-500"></i> Profile
                            </a>
                            <a href="{% url 'owner_info' %}#security" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-50">
                                <i class="fas fa-lock mr-2 text-gray-500"></i> Security
                            </a>
                            <div class="border-t border-gray-100 my-1"></div>
                            <a href="{% url 'logout' %}" class="block px-4 py-2 text-sm text-red-600 hover:bg-red-50">
                                <i class="fas fa-sign-out-alt mr-2"></i> Sign Out
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <!-- Mobile menu (hidden by default) -->
    <div class="mobile-menu hidden md:hidden bg-white border-b border-gray-200">
        <div class="px-2 pt-2 pb-3 space-y-1">
            <a href="{% url 'owner_home' %}" 
               class="block px-3 py-2 rounded-md text-base font-medium text-gray-700 hover:bg-gray-50 {% if request.resolver_match.url_name == 'owner_home' %}bg-gray-50{% endif %}">
                My Properties
            </a>
            <a href="{% url 'owner_requests' %}" 
               class="block px-3 py-2 rounded-md text-base font-medium text-gray-700 hover:bg-gray-50 {% if request.resolver_match.url_name == 'owner_requests' %}bg-gray-50{% endif %}">
                Tenant Requests
            </a>
        </div>
    </div>

    <script>
        // Mobile menu toggle (add a button in your actual implementation)
    </script>
</body>
</html>
